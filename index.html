<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>挽回 ISFP 挑战</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0e0a0e;color:#f0ece4;min-height:100vh;overflow-x:hidden}

/* Animated bg */
.bg{position:fixed;inset:0;z-index:-2;background:radial-gradient(ellipse at 30% 20%,rgba(254,202,87,.08),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(224,122,95,.04),transparent 50%),#0e0a0e}
.particles{position:fixed;inset:0;z-index:-1;pointer-events:none}
.p{position:absolute;width:2px;height:2px;background:rgba(254,202,87,.2);border-radius:50%;animation:drift linear infinite}
@keyframes drift{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}

/* Screen shake */
@keyframes shake{0%,100%{transform:translateX(0)}10%,30%,50%,70%,90%{transform:translateX(-6px)}20%,40%,60%,80%{transform:translateX(6px)}}
.shake{animation:shake .5s}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fadeIn .4s ease}

/* ===== HEADER ===== */
.hd{text-align:center;padding:32px 20px 20px;position:relative}
.hd-badge{display:inline-block;padding:3px 12px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(244,162,97,.1);color:#a29bfe;letter-spacing:1px;margin-bottom:10px;border:1px solid rgba(244,162,97,.15)}
.hd h1{font-size:28px;font-weight:800;letter-spacing:-.5px;background:linear-gradient(135deg,#f0ece4,#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd p{font-size:12px;color:rgba(240,236,228,.3);margin-top:6px}

.ct{max-width:480px;margin:0 auto;padding:0 14px 30px}

/* ===== HOME ===== */
.home{text-align:center;padding:20px 0}
.home-icon{font-size:72px;margin-bottom:12px;display:block}
.home-sub{font-size:13px;color:rgba(240,236,228,.4);margin-bottom:4px;letter-spacing:1px}
.home-title{font-size:22px;font-weight:800;margin-bottom:6px;color:#f0ece4}
.home-desc{font-size:12px;color:rgba(240,236,228,.3);line-height:1.7;margin:8px 0 20px;padding:0 10px}
.home-stats{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
.home-stats span{padding:4px 12px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);font-size:11px;color:rgba(240,236,228,.4)}

/* ===== BUTTON ===== */
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#a29bfe,#6c5ce7);color:#fff;box-shadow:0 4px 20px rgba(254,202,87,.2)}
.btn-primary:hover{box-shadow:0 6px 28px rgba(244,162,97,.3)}
.btn-second{background:rgba(255,255,255,.03);color:rgba(240,236,228,.4);border:1px solid rgba(255,255,255,.06)}
.btn-danger{background:linear-gradient(135deg,#e94560,#c23152);color:#fff}

/* ===== CARD ===== */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:20px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#a29bfe,transparent);opacity:.5}

/* HP BAR */
.hp-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.hp-icon{font-size:16px;flex-shrink:0}
.hp-track{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.hp-fill{height:100%;border-radius:3px;transition:width .5s ease}
.hp-text{font-size:11px;color:rgba(240,236,228,.4);min-width:32px;text-align:right}
.hp-fill.green{background:linear-gradient(90deg,#4caf50,#66bb6a)}
.hp-fill.yellow{background:linear-gradient(90deg,#ff9800,#ffc107)}
.hp-fill.red{background:linear-gradient(90deg,#e94560,#f44336)}

/* LEVEL HEADER */
.lv-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.lv-name{font-size:11px;font-weight:600;color:rgba(244,162,97,.8);letter-spacing:1px}
.lv-death{font-size:10px;color:rgba(233,69,96,.6)}

.lv-scene{font-size:13px;color:rgba(240,236,228,.5);line-height:1.7;margin-bottom:12px;padding:12px 14px;background:rgba(255,255,255,.02);border-radius:10px;border-left:2px solid rgba(244,162,97,.3)}
.lv-line{font-size:15px;font-weight:600;color:#f0ece4;margin-bottom:16px;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;text-align:center;border:1px solid rgba(255,255,255,.04)}

/* OPTIONS */
.opts{display:flex;flex-direction:column;gap:7px}
.opt{width:100%;padding:13px 14px;border:1px solid rgba(255,255,255,.06);border-radius:10px;background:rgba(255,255,255,.02);font-size:13px;color:#f0ece4;cursor:pointer;text-align:left;font-family:inherit;transition:all .2s;line-height:1.4}
.opt:hover{border-color:rgba(254,202,87,.2);background:rgba(254,202,87,.04)}
.opt:active{transform:scale(.97)}
.opt .il{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:8px;font-size:10px;font-weight:700;margin-right:10px;color:#fff}
.opt .s1{background:#a29bfe}.opt .s2{background:#6c5ce7}.opt .s3{background:#d4af37}.opt .s4{background:#8ecae6}

.opt.wrong{animation:shake .5s;border-color:#e94560;background:rgba(233,69,96,.08)!important}
.opt.right{border-color:#4caf50;background:rgba(76,175,80,.08)!important}

/* ===== GAME OVER ===== */
.go-screen{text-align:center;padding:30px 0}
.go-icon{font-size:72px;margin-bottom:10px;display:block}
.go-title{font-size:24px;font-weight:800;color:#e94560;margin-bottom:4px}
.go-sub{font-size:12px;color:rgba(240,236,228,.3);margin-bottom:16px}
.go-desc{font-size:13px;color:rgba(240,236,228,.4);line-height:1.8;padding:16px;background:rgba(233,69,96,.04);border-radius:12px;margin-bottom:16px;border-left:2px solid #e94560}
.go-stats{font-size:11px;color:rgba(240,236,228,.25);margin-bottom:20px}
.go-stats span{padding:3px 10px;background:rgba(255,255,255,.02);border-radius:6px}

/* ===== WIN ===== */
.win-icon{font-size:72px;margin-bottom:10px;display:block}
.win-title{font-size:24px;font-weight:800;color:#a29bfe;margin-bottom:4px}
.win-desc{font-size:13px;color:rgba(240,236,228,.4);line-height:1.8;padding:16px;background:rgba(254,202,87,.04);border-radius:12px;margin-bottom:16px;border-left:2px solid #a29bfe}
.win-stats{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.win-stats span{padding:6px 14px;border-radius:8px;font-size:12px}
.win-stats .s{background:rgba(76,175,80,.1);color:#66bb6a}
.win-stats .f{background:rgba(233,69,96,.1);color:#e94560}

/* BRAND */
.brand{display:flex;align-items:center;gap:12px;padding:14px;border-radius:12px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);margin-top:12px}
.brand img{width:72px;height:72px;border-radius:10px;flex-shrink:0;object-fit:cover;border:1px solid rgba(255,255,255,.06)}
.brand .bn{font-size:14px;font-weight:700;color:#f0ece4;letter-spacing:2px}
.brand .bs{font-size:10px;color:rgba(240,236,228,.25);margin-top:3px;line-height:1.5}
.ft{font-size:9px;color:rgba(240,236,228,.15);text-align:center;margin-top:16px;line-height:1.6}
</style>
</head>
<body>
<div class="bg"></div>
<div class="particles" id="particles"></div>

<div class="hd">
  <div class="hd-badge">✦ 闯关挑战</div>
  <h1>挽回 ISFP</h1>
  <p>你能闯到第几关？</p>
</div>

<div class="ct" id="app"></div>

<script>
// Particles
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<30;i++){const p=document.createElement('div');p.className='p';p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*12)+'s';p.style.animationDelay=Math.random()*10+'s';p.style.width=p.style.height=(1+Math.random()*2)+'px';c.appendChild(p)}
})();

const DATA={
  emoji:'🎨',title:'ISFP',subtitle:'安静退潮的艺术家',
  desc:'ISFP 曾经很亮，但热情不是无限电池。被困住、被敷衍、被降温，都会让 TA 突然转身。',
  color:'#a29bfe'
};

const STAGES=[{scene:'TA开始一个人画画一画就是一整天画里全是灰色你问TA画的什么TA说心情',line:'回应变淡',safe:1,dmg:1,death:'你问TA画了什么TA说你不会懂的然后你把画弄脏了TA把画扔了也把你扔了'},{scene:'你发现TA在听歌的时候哭了看到你进来又擦掉眼泪说只是被歌词打动了',line:'不再主动',safe:2,dmg:2,death:'你假装没看到TA在哭TA说你假装没看到的样子真的很熟练'},{scene:'TA开始穿黑色衣服以前TA很喜欢彩色的现在像在给自己的心情办葬礼',line:'开始敷衍',safe:3,dmg:2,death:'你说穿黑色不好看TA说嗯然后把所有彩色衣服都收起来了那些彩色只为你穿过'},{scene:'你说了很重的话TA什么都没说只是默默把刚给你倒的水端走了',line:'拒绝交流',safe:4,dmg:3,death:'你没听懂那杯水被端走的意思——那是TA最后一次照顾你'},{scene:'你发现TA最近在整理以前的东西那些曾经舍不得丢的都开始丢了',line:'回避规划',safe:1,dmg:3,death:'你说丢了就丢了呗TA说对人和东西都一样丢了就丢了'},{scene:'TA开始频繁更新社交状态但每一条都像在告别每一条都不是写给你的',line:'情感降温',safe:2,dmg:4,death:'你评论TA的动态TA删了评论你问为什么TA说你已经不在阅读权限内了'},{scene:'你问TA开不开心TA说开心了然后叹了气那声叹气比吵架还响',line:'社交剥离',safe:3,dmg:4,death:'你听到那声叹气你假装没听到TA再也没有在你面前叹过气'},{scene:'你发现TA在备忘录里写了很多诗诗的结尾都是再见',line:'失去耐心',safe:4,dmg:5,death:'你读了TA的诗你说写得不好TA把日记锁上了你是第一个也是最后一个读者'},{scene:'TA开始种植物以前没耐心现在突然养了很多并且给每一棵都取了名字',line:'冷漠循环',safe:1,dmg:5,death:'你笑TA养植物TA说你不知道吗会养死的都会被养死的'},{scene:'你看了TA的画发现最近画的每一幅里都没有人物只有空旷的房间',line:'划清界限',safe:2,dmg:5,death:'你看到画里没有人你说怎么不画我TA说因为画不进去了'},{scene:'TA在阳台坐了一整天从日出到日落什么都没做就是看着远处',line:'清理痕迹',safe:3,dmg:5,death:'你在阳台找到TA你说外面冷TA说不冷比心里暖你和TA站在一起但你们之间隔了整片海'},{scene:'你最后一次见到TA的时候TA对你笑了那是你见过最温柔的笑也是最后一个',line:'最终告别',safe:4,dmg:5,death:'你收到那个笑容你以为是和好的信号结果是TA最后一次温柔然后你再也找不到TA了'}];

let hp=10,maxHp=9,cur=0,sc=0,over=false;
const A=document.getElementById('app');

function hm(){A.innerHTML=`<div class="home"><span class="home-icon">${DATA.emoji}</span><div class="home-sub">闯关挑战</div><div class="home-title">挽回 ${DATA.title}</div><div class="home-desc">${DATA.desc}</div><div class="home-stats"><span>❤️ 初始 HP ${maxHp}</span><span>💀 选错扣血</span><span>🏆 共${STAGES.length}关</span></div><button class="btn btn-primary" onclick="go()">▶ 开始挑战</button><div class="brand" style="margin-top:20px"><div><div class="bn">灵客星球</div><div class="bs">想自己搭这种游戏？扫码聊聊</div></div></div></div>`;}

function go(){
  hp=maxHp;cur=0;sc=0;over=false;A.innerHTML='<div class="fi">'+lv()+'</div>';
}

function lv(){
  if(over)return '';
  if(cur>=STAGES.length||hp<=0)return end();
  const s=STAGES[cur];
  return `<div class="hp-bar"><span class="hp-icon">❤️</span><div class="hp-track"><div class="hp-fill ${hp>6?'green':hp>3?'yellow':'red'}" style="width:${(hp/maxHp)*100}%"></div></div><span class="hp-text">${hp}/${maxHp}</span></div>
    <div class="card fi"><div class="lv-hd"><span class="lv-name">⚠️ 第${cur+1}/${STAGES.length}关</span><span class="lv-death">💀 选错 -${s.dmg}HP</span></div>
    <div class="lv-scene">${s.scene}</div><div class="lv-line">"${s.line}"</div><div class="opts">
	    <button class="opt" onclick="pk(0)"><span class="il s1">A</span>A选项</button>
	    <button class="opt" onclick="pk(1)"><span class="il s2">B</span>B选项</button>
	    <button class="opt" onclick="pk(2)"><span class="il s3">C</span>C选项</button>
    <button class="opt" onclick="pk(3)"><span class="il s4">D</span>选项D</button>
    </div></div>`;
}

function pk(i){
  if(over)return;
  const s=STAGES[cur];
  const isSafe=(i+1)===s.safe;
  const btns=document.querySelectorAll('.opt');
  btns.forEach(b=>b.style.pointerEvents='none');

  if(isSafe){
    sc+=2;
    btns[i].classList.add('right');
    setTimeout(()=>{cur++;A.innerHTML='<div class="fi">'+lv()+'</div>';},600);
  } else {
    hp-=s.dmg;
    btns[i].classList.add('wrong');
    document.body.classList.add('shake');
    setTimeout(()=>document.body.classList.remove('shake'),500);

    if(hp<=0){
      over=true;
      setTimeout(()=>{A.innerHTML=end()},800);
    } else {
      setTimeout(()=>{cur++;A.innerHTML='<div class="fi">'+lv()+'</div>';},600);
    }
  }
}

function end(){
  if(over||hp<=0){
    return `<div class="go-screen fi"><div class="go-icon">💀</div><div class="go-title">闯关失败</div><div class="go-sub">你在第${Math.max(1,cur)}关倒下了</div><div class="go-desc">${STAGES[Math.min(cur,STAGES.length-1)].death||'ISFP已经彻底离开了你的世界。'}</div><div class="go-stats"><span>❤️ HP归零</span><span>🏆 闯到第${Math.max(1,cur)}关</span></div><button class="btn btn-danger" onclick="go()">🔄 重新挑战</button></div>`;
  }
  // Win
  return `<div class="card fi" style="text-align:center;padding:30px"><span class="win-icon">🎉</span><div class="win-title">恭喜通关！</div><div style="font-size:12px;color:rgba(240,236,228,.3);margin:4px 0 14px">你成功挽回了ISFP的心</div><div class="win-desc">你完全读懂了ISFP。你知道什么时候该靠近、什么时候该给空间。不是因为你多会说话，而是因为你真的看见了TA。TA选择了回来。</div><div class="win-stats"><span class="s">❤️ HP剩余 ${hp}</span><span class="f">💀 失误 ${STAGES.length-cur}</span></div><button class="btn btn-primary" onclick="cap()">📸 保存战绩发朋友圈</button><div style="height:8px"></div><button class="btn btn-second" onclick="go()">🔄 重新挑战</button></div>`;
}

function cap(){
  if(typeof html2canvas==='undefined'){alert('请截图保存');return}
  const el=document.querySelector('.card');
  if(!el)return;
  html2canvas(el,{backgroundColor:'#f5f0ea',scale:2,useCORS:true,logging:false}).then(function(c){
    const w=window.open('','_blank');
    if(w){
      w.document.write('<div style="padding:30px 16px;text-align:center;font-family:sans-serif;background:#f5f0ea;min-height:100vh">');
      w.document.write('<img src="'+c.toDataURL('image/png')+'" style="max-width:100%;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08)"/>');
      w.document.write('<p style="margin-top:20px;color:#666;font-size:14px">👆 长按图片保存到手机</p>');
      w.document.write('</div>');
    }
  }).catch(function(){alert('截图失败请手动截图')});
}

hm();
</script>
</body>
</html>
